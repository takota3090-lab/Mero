<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مروة - مساعدك الشخصي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --gold: #D4AF37;
            --gold-dark: #B8941F;
            --dark: #0A0A0A;
            --card: #151515;
            --text: #FFFFFF;
            --text-dim: #A0A0A0;
            --danger: #EF4444;
            --success: #10B981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header - Fixed */
        .header {
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .greeting {
            margin-top: 4px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .name {
            color: var(--gold);
            font-weight: 700;
        }

        /* Stats Row */
        .stats {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .stat-card {
            flex: 1;
            background: rgba(212, 175, 55, 0.12);
            border-radius: 16px;
            padding: 8px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .stat-number {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--text-dim);
        }

        /* Tab Bar - Fixed */
        .tabs {
            display: flex;
            background: rgba(21, 21, 21, 0.98);
            backdrop-filter: blur(20px);
            margin: 8px 16px;
            border-radius: 40px;
            padding: 4px;
            gap: 4px;
            position: sticky;
            top: 95px;
            z-index: 99;
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 4px;
            border-radius: 36px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
        }

        .tab i {
            font-size: 1.2rem;
            font-style: normal;
        }

        /* Content Area - Scrollable */
        .content {
            padding: 8px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Tab Panels */
        .panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: rgba(21, 21, 21, 0.9);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
        }

        /* Forms */
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--dark);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 12px;
        }

        textarea {
            min-height: 70px;
            resize: vertical;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 14px;
            color: var(--dark);
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        /* Quick Add */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .quick-item {
            background: var(--dark);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-item:active {
            transform: scale(0.96);
            background: rgba(212, 175, 55, 0.1);
        }

        /* Lists - Scrollable */
        .list {
            max-height: 400px;
            overflow-y: auto;
        }

        .list-item {
            background: var(--dark);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 3px solid var(--gold);
        }

        .item-info h4 {
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .item-amount {
            font-weight: 700;
            color: var(--gold);
            font-size: 0.9rem;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.7rem;
            width: auto;
            transition: all 0.2s;
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        /* Mood Grid */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .mood-btn {
            aspect-ratio: 1;
            background: var(--dark);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mood-btn:active {
            transform: scale(0.95);
        }

        .mood-btn.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.2);
        }

        /* Goal Item */
        .goal-item {
            background: var(--dark);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            width: 0%;
            transition: width 0.3s;
        }

        .empty {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-dim);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 2000;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
        }

        .flex {
            display: flex;
            gap: 8px;
        }

        .text-sm {
            font-size: 0.75rem;
        }

        .text-gold {
            color: var(--gold);
        }

        .mt-1 {
            margin-top: 6px;
        }

        .mb-1 {
            margin-bottom: 6px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .tab span {
                display: none;
            }
            .tab i {
                font-size: 1.4rem;
            }
            .tab {
                padding: 8px 4px;
            }
            .logo {
                font-size: 1.5rem;
            }
            .stats {
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">مروة</div>
    <div class="greeting">مرحباً <span class="name">ميرو</span> ✨</div>
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalSpend">0</div>
            <div class="stat-label">إجمالي المصروفات</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="todayMood">--</div>
            <div class="stat-label">مزاج اليوم</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="streakCount">0</div>
            <div class="stat-label">أيام متتالية</div>
        </div>
    </div>
</div>

<div class="tabs">
    <button class="tab active" data-tab="home"><i>🏠</i><span>الرئيسية</span></button>
    <button class="tab" data-tab="spend"><i>💰</i><span>المصروفات</span></button>
    <button class="tab" data-tab="mood"><i>😊</i><span>المزاج</span></button>
    <button class="tab" data-tab="goals"><i>🎯</i><span>الأهداف</span></button>
</div>

<div class="content">
    <!-- HOME PANEL -->
    <div id="home" class="panel active">
        <div class="card">
            <div class="card-title">✨ اقتباس اليوم</div>
            <p id="dailyQuote" style="font-style: italic; color: var(--gold); font-size: 1rem;">"الادخار أساس الثروة"</p>
        </div>

        <div class="card">
            <div class="card-title">⚡ إضافة سريعة</div>
            <div class="quick-grid">
                <div class="quick-item" onclick="quickAdd('قهوة', 25)"><div style="font-size: 1.2rem;">☕</div><div class="text-sm">قهوة 25</div></div>
                <div class="quick-item" onclick="quickAdd('غداء', 60)"><div style="font-size: 1.2rem;">🍽️</div><div class="text-sm">غداء 60</div></div>
                <div class="quick-item" onclick="quickAdd('مواصلات', 15)"><div style="font-size: 1.2rem;">🚗</div><div class="text-sm">مواصلات 15</div></div>
                <div class="quick-item" onclick="quickAdd('عصير', 10)"><div style="font-size: 1.2rem;">🥤</div><div class="text-sm">عصير 10</div></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📊 آخر المصروفات</div>
            <div id="recentList" class="list" style="max-height: 300px;"></div>
        </div>
    </div>

    <!-- SPEND PANEL -->
    <div id="spend" class="panel">
        <div class="card">
            <div class="card-title">➕ إضافة مصروف</div>
            <input type="text" id="spendDesc" placeholder="الوصف (مثال: قهوة، غداء)">
            <input type="number" id="spendAmount" placeholder="المبلغ (جنيه مصري)" step="0.5">
            <select id="spendCat">
                <option value="طعام">🍽️ طعام</option>
                <option value="مواصلات">🚗 مواصلات</option>
                <option value="تسوق">🛍️ تسوق</option>
                <option value="ترفيه">🎬 ترفيه</option>
                <option value="فواتير">💡 فواتير</option>
                <option value="أخرى">📦 أخرى</option>
            </select>
            <button onclick="addSpending()">✨ إضافة المصروف</button>
        </div>

        <div class="card">
            <div class="card-title">📋 سجل المصروفات</div>
            <div id="spendList" class="list" style="max-height: 500px;"></div>
        </div>
    </div>

    <!-- MOOD PANEL -->
    <div id="mood" class="panel">
        <div class="card">
            <div class="card-title">😊 كيف تشعر اليوم؟</div>
            <div class="mood-grid">
                <button class="mood-btn" onclick="selectMood('😊', 'سعيد')">😊</button>
                <button class="mood-btn" onclick="selectMood('😌', 'هادئ')">😌</button>
                <button class="mood-btn" onclick="selectMood('🤔', 'مفكر')">🤔</button>
                <button class="mood-btn" onclick="selectMood('💪', 'نشيط')">💪</button>
                <button class="mood-btn" onclick="selectMood('😴', 'متعب')">😴</button>
                <button class="mood-btn" onclick="selectMood('😤', 'متضايق')">😤</button>
            </div>
            <textarea id="thoughtText" placeholder="اكتب خاطرك هنا..."></textarea>
            <button onclick="saveMood()">📝 حفظ المزاج والخاطرة</button>
        </div>

        <div class="card">
            <div class="card-title">📝 خواطري</div>
            <div id="thoughtsList" class="list" style="max-height: 400px;"></div>
        </div>
    </div>

    <!-- GOALS PANEL -->
    <div id="goals" class="panel">
        <div class="card">
            <div class="card-title">🎯 هدف جديد</div>
            <input type="text" id="goalName" placeholder="اسم الهدف (مثال: رحلة، سيارة)">
            <input type="number" id="goalTarget" placeholder="المبلغ المستهدف (جنيه)">
            <button onclick="addGoal()">🚀 إنشاء الهدف</button>
        </div>

        <div class="card">
            <div class="card-title">🏆 أهدافي</div>
            <div id="goalsList" class="list" style="max-height: 500px;"></div>
        </div>
    </div>
</div>

<script>
    // Data
    let spendings = [];
    let moods = [];
    let thoughts = [];
    let goals = [];
    let streak = 0;
    let lastActive = null;
    let currentMood = null;
    let currentMoodLabel = '';

    // Load data
    function loadData() {
        try {
            const saved = localStorage.getItem('marwa_app_v2');
            if (saved) {
                const data = JSON.parse(saved);
                spendings = data.spendings || [];
                moods = data.moods || [];
                thoughts = data.thoughts || [];
                goals = data.goals || [];
                streak = data.streak || 0;
                lastActive = data.lastActive || null;
            }
        } catch(e) { console.log(e); }
        checkStreak();
        updateUI();
    }

    function saveData() {
        const data = { spendings, moods, thoughts, goals, streak, lastActive };
        localStorage.setItem('marwa_app_v2', JSON.stringify(data));
        updateUI();
    }

    // Streak
    function checkStreak() {
        const today = new Date().toDateString();
        if (lastActive) {
            const lastDate = new Date(lastActive);
            const diff = Math.floor((new Date() - lastDate) / 86400000);
            if (diff === 1) {
                streak++;
            } else if (diff > 1) {
                streak = 1;
            }
        } else {
            streak = 1;
        }
        lastActive = new Date().toISOString();
    }

    // Spending
    function addSpending() {
        const desc = document.getElementById('spendDesc').value.trim();
        const amount = parseFloat(document.getElementById('spendAmount').value);
        const cat = document.getElementById('spendCat').value;

        if (!desc) { showToast('✏️ اكتب الوصف'); return; }
        if (isNaN(amount) || amount <= 0) { showToast('💰 أدخل مبلغ صحيح'); return; }

        spendings.unshift({
            id: Date.now(),
            desc: desc,
            amount: amount,
            category: cat,
            date: new Date().toISOString()
        });

        document.getElementById('spendDesc').value = '';
        document.getElementById('spendAmount').value = '';
        saveData();
        showToast('✨ تم إضافة المصروف بنجاح');
    }

    function quickAdd(desc, amount) {
        spendings.unshift({
            id: Date.now(),
            desc: desc,
            amount: amount,
            category: 'سريع',
            date: new Date().toISOString()
        });
        saveData();
        showToast(`✅ تم إضافة ${desc} بـ ${amount} جنيه`);
    }

    function deleteSpending(id) {
        if (confirm('هل أنت متأكد من الحذف؟')) {
            spendings = spendings.filter(s => s.id !== id);
            saveData();
            showToast('🗑️ تم الحذف');
        }
    }

    // Mood
    function selectMood(emoji, label) {
        currentMood = emoji;
        currentMoodLabel = label;
        document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    function saveMood() {
        const thought = document.getElementById('thoughtText').value.trim();
        
        if (!currentMood && !thought) {
            showToast('😊 اختر مزاجاً أو اكتب خاطرة');
            return;
        }

        const moodEntry = {
            id: Date.now(),
            mood: currentMood || '😐',
            moodLabel: currentMoodLabel || 'عادي',
            thought: thought || '',
            date: new Date().toISOString()
        };

        moods.unshift(moodEntry);
        if (thought) {
            thoughts.unshift(moodEntry);
        }

        document.getElementById('thoughtText').value = '';
        document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
        currentMood = null;
        currentMoodLabel = '';
        saveData();
        showToast('📝 تم حفظ المزاج والخاطرة');
    }

    // Goals
    function addGoal() {
        const name = document.getElementById('goalName').value.trim();
        const target = parseFloat(document.getElementById('goalTarget').value);

        if (!name) { showToast('📝 أدخل اسم الهدف'); return; }
        if (isNaN(target) || target <= 0) { showToast('💰 أدخل مبلغ مستهدف'); return; }

        goals.push({
            id: Date.now(),
            name: name,
            target: target,
            saved: 0,
            date: new Date().toISOString()
        });

        document.getElementById('goalName').value = '';
        document.getElementById('goalTarget').value = '';
        saveData();
        showToast('🎯 تم إنشاء الهدف بنجاح');
    }

    function addToGoal(id) {
        const amount = parseFloat(prompt('المبلغ المضاف للهدف (جنيه مصري):'));
        if (!isNaN(amount) && amount > 0) {
            const goal = goals.find(g => g.id === id);
            if (goal) {
                goal.saved = Math.min(goal.saved + amount, goal.target);
                if (goal.saved >= goal.target) {
                    showToast('🎉 مبروك! لقد حققت هدفك! 🎉');
                }
                saveData();
                showToast(`✅ تم إضافة ${amount} جنيه للهدف`);
            }
        }
    }

    function deleteGoal(id) {
        if (confirm('هل أنت متأكد من حذف هذا الهدف؟')) {
            goals = goals.filter(g => g.id !== id);
            saveData();
            showToast('🗑️ تم حذف الهدف');
        }
    }

    // Update UI
    function updateUI() {
        // Stats
        const total = spendings.reduce((s, p) => s + p.amount, 0);
        document.getElementById('totalSpend').innerText = total.toFixed(0);
        document.getElementById('streakCount').innerText = streak;

        const todayMood = moods.find(m => new Date(m.date).toDateString() === new Date().toDateString());
        document.getElementById('todayMood').innerText = todayMood ? todayMood.mood : '--';

        // Recent spendings (home)
        const recentContainer = document.getElementById('recentList');
        if (spendings.length === 0) {
            recentContainer.innerHTML = '<div class="empty">📭 لا توجد مصروفات</div>';
        } else {
            recentContainer.innerHTML = spendings.slice(0, 10).map(s => `
                <div class="list-item">
                    <div class="item-info">
                        <h4>${escapeHtml(s.desc)}</h4>
                        <p>${s.amount.toFixed(0)} جنيه • ${formatDate(s.date)}</p>
                    </div>
                </div>
            `).join('');
        }

        // Spendings list
        const spendContainer = document.getElementById('spendList');
        if (spendings.length === 0) {
            spendContainer.innerHTML = '<div class="empty">📭 لا توجد مصروفات مسجلة</div>';
        } else {
            spendContainer.innerHTML = spendings.map(s => `
                <div class="list-item">
                    <div class="item-info" style="flex: 1;">
                        <h4>${escapeHtml(s.desc)}</h4>
                        <p>${s.category} • ${formatDate(s.date)}</p>
                    </div>
                    <div class="flex" style="align-items: center;">
                        <div class="item-amount">${s.amount.toFixed(0)} ج.م</div>
                        <button class="delete-btn" onclick="deleteSpending(${s.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Thoughts list
        const thoughtsContainer = document.getElementById('thoughtsList');
        if (thoughts.length === 0) {
            thoughtsContainer.innerHTML = '<div class="empty">📝 لا توجد خواطر مسجلة</div>';
        } else {
            thoughtsContainer.innerHTML = thoughts.slice(0, 20).map(t => `
                <div class="list-item">
                    <div class="item-info">
                        <h4>${t.mood} ${t.moodLabel}</h4>
                        <p>${escapeHtml(t.thought.substring(0, 80))}${t.thought.length > 80 ? '...' : ''}</p>
                        <p class="text-sm text-dim" style="color: var(--text-dim); margin-top: 4px;">${formatDate(t.date)}</p>
                    </div>
                </div>
            `).join('');
        }

        // Goals list
        const goalsContainer = document.getElementById('goalsList');
        if (goals.length === 0) {
            goalsContainer.innerHTML = '<div class="empty">🎯 لا توجد أهداف</div>';
        } else {
            goalsContainer.innerHTML = goals.map(g => {
                const percent = (g.saved / g.target) * 100;
                return `
                    <div class="goal-item">
                        <div class="goal-header">
                            <span class="text-gold" style="font-weight: 700;">${escapeHtml(g.name)}</span>
                            <span>${g.saved.toFixed(0)} / ${g.target.toFixed(0)} ج.م</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                        <div class="flex mt-1">
                            <button class="delete-btn" onclick="addToGoal(${g.id})" style="flex:1; background: rgba(16, 185, 129, 0.1); color: var(--success);">+ إضافة</button>
                            <button class="delete-btn" onclick="deleteGoal(${g.id})" style="flex:1;">🗑️ حذف</button>
                        </div>
                        <div class="text-sm mt-1" style="color: var(--text-dim);">التقدم: ${percent.toFixed(1)}%</div>
                    </div>
                `;
            }).join('');
        }
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 86400000);
        
        if (diff === 0) return 'اليوم';
        if (diff === 1) return 'أمس';
        if (diff < 7) return `منذ ${diff} أيام`;
        return date.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Toast
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabName = tab.dataset.tab;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
        });
    });

    // Quotes
    const quotes = [
        "الادخار أساس الثروة",
        "المال في اليد وليس في القلب",
        "القناعة كنز لا يفنى",
        "التخطيط يصنع الغد",
        "من ترك شيئاً لله عوضه",
        "ابدأ صغيراً واحلم كبيراً",
        "اليوم أفضل من الأمس"
    ];
    document.getElementById('dailyQuote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // Initialize
    loadData();
</script>
</body>
</html>
